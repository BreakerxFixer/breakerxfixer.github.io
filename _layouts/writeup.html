<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

<nav>
  <a href="/">Inicio</a>
  <a href="/writeups.html">Writeups</a>
</nav>

<main class="container">

  <h1>{{ page.title }}</h1>

  <div class="meta">
    <span>📅 {{ page.date | date: "%d/%m/%Y" }}</span>
    <span>⚡ {{ page.dificultad }}</span>
    <span>🖥️ {{ page.plataforma }}</span>
  </div>

  <hr>

  <article class="writeup-content">
    {{ content }}
  </article>

</main>

<script src="/main.js"></script>
</body>
</html>
