<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Breaker x Fixer</title>
  <link rel="stylesheet" href="/styles.css?v={{ site.time | date: '%s' }}">
</head>

<body>
  <div class="main-container top-container">
    <header class="header">
      <h1><a href="/index.html" style="color: inherit; text-decoration: none;">&gt;the Breaker &amp;&amp; the Fixer</a></h1>
      <nav class="top-nav">
        <a href="/writeups.html">Writeups</a>
        <a href="/ctf.html" style="color: #ff003c; text-shadow: 0 0 5px rgba(255,0,0,0.5);">CTF</a>
        <a href="/aboutus.html">About Us</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </header>
  </div>

  <main class="writeups-container" style="max-width: 900px;">
    <div class="writeup-header-meta" style="text-align: center; margin-bottom: 40px;">
      <h1 class="writeup-main-title" style="font-family: 'Dirtyline', sans-serif; font-size: 3.5rem; background: linear-gradient(90deg, #ffffff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">{{ page.title }}</h1>
      <div class="writeup-meta" style="justify-content: center; margin-top: 15px;">
        <span class="badge" style="background-color: #222; color: #aaa; border: 1px solid #444;">📅 {{ page.date | date: "%d/%m/%Y" }}</span>
        {% if page.dificultad %}
        <span class="badge diff-{{ page.dificultad | downcase }}">{{ page.dificultad }}</span>
        {% endif %}
        {% if page.plataforma %}
        <span class="badge plat-{{ page.plataforma | downcase | replace: ' ', '-' }}">{{ page.plataforma }}</span>
        {% endif %}
      </div>
    </div>

    <article class="writeup-content">
      {{ content }}
    </article>
  </main>

  <script src="/main.js?v={{ site.time | date: '%s' }}"></script>
</body>

</html>
