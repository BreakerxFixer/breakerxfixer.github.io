<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Writeups</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

<h1>🧠 Writeups</h1>

<ul>
  {% for post in site.writeups %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      {{ post.dificultad }} - {{ post.plataforma }}
    </li>
  {% endfor %}
</ul>

</body>
</html>
