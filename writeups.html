<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Writeups</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

<nav>
  <a href="/">Inicio</a>
</nav>

<main class="container">

<h1>🧠 Writeups</h1>

<input type="text" id="search" placeholder="Buscar writeup...">

<ul id="writeup-list">
  {% for post in site.writeups %}
    <li class="writeup-item">
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="tag">{{ post.dificultad }}</span>
      <span class="tag">{{ post.plataforma }}</span>
    </li>
  {% endfor %}
</ul>

</main>

<script src="/main.js"></script>
</body>
</html>
